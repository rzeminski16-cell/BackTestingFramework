name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        experimental: [false]
        include:
          # Newest interpreter is informational until the numeric stack is
          # verified there; failures don't block merges.
          - python-version: "3.12"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (fresh environment)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-timeout

      - name: Run test suite
        run: python -m pytest tests/ -q --timeout=900

  lint:
    name: ruff (correctness gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: python -m pip install ruff

      # Ruleset lives in pyproject.toml: syntax errors, invalid comparisons,
      # undefined names. Style rules are opt-in later.
      - name: Lint
        run: ruff check .
